<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guia de Gestão de Pátio · Segalas Alimentos</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .header p {
      color: #6b7280;
      font-size: 17px;
      line-height: 1.5;
    }

    .accordion {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      border-left: 8px solid;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: all 0.3s ease;
    }

    .card-header {
      cursor: pointer;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 18px;
      flex: 1;
    }

    .step-number {
      width: 52px;
      height: 52px;
      min-width: 52px;
      border-radius: 14px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
    }

    .title-group h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      color: white;
    }

    .chevron {
      width: 18px;
      height: 18px;
      border-right: 3px solid #6b7280;
      border-bottom: 3px solid #6b7280;
      transform: rotate(45deg);
      transition: transform 0.3s ease;
      margin-right: 10px;
    }

    .card.active .chevron {
      transform: rotate(-135deg);
      margin-top: 8px;
    }

    .card-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      background: #fff;
    }

    .content-inner {
      padding: 0 24px 28px 24px;
    }

    .status-flow {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .status-pill {
      background: #eef2ff;
      color: #374151;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 26px;
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      line-height: 1.5;
    }

    .check-icon {
      color: #16a34a;
      font-weight: bold;
      font-size: 18px;
      margin-top: 1px;
    }

    .note-box {
      background: #f9fafb;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .note-box h4 {
      margin-bottom: 10px;
      font-size: 15px;
    }

    .line-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .line-card {
      color: white;
      padding: 18px;
      border-radius: 14px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 90px;
    }

    .alert-box {
      background: #fff1f1;
      border: 2px solid #ef4444;
      border-radius: 16px;
      padding: 20px;
    }

    .alert-title {
      color: #b91c1c;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .alert-text {
      color: #7f1d1d;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .card-header {
        align-items: flex-start;
      }

      .title-group h2 {
        font-size: 18px;
      }

      .header h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Guia de gestão de pátio · Segalas Alimentos</h1>
    <p>
      Clique em cada etapa para ver o que fazer, quem faz e o que trava se o status não for atualizado.
    </p>
  </div>

  <div class="accordion" id="accordion"></div>

</div>

<script>
  const etapas = [
    {
      numero: 1,
      titulo: "Veículo no pátio (check-in)",
      setor: "Faturamento",
      cor: "#1D9E75",
      de: "Fornecedor",
      para: "Veículo no pátio",
      acoes: [
        "Receber o motorista na portaria",
        "Registrar o veículo no sistema de pátio (placa, transportadora, fornecedor)",
        "Mudar status para 'Veículo no Pátio' no sistema"
      ],
      alertaTitulo: "Se o status não for atualizado:",
      alerta: "Sem o check-in registrado no sistema, o Faturamento não enxerga o veículo na fila e não consegue iniciar a conferência fiscal. O veículo fica invisível para toda a operação."
    },

    {
      numero: 2,
      titulo: "Aguardando descarga (conferência fiscal)",
      setor: "Faturamento",
      cor: "#378ADD",
      de: "Veículo no pátio",
      para: "Aguardando descarga",
      acoes: [
        "Conferir CNPJ do fornecedor com o cadastro",
        "Verificar número e valor da Ordem de Compra (OC) x Nota Fiscal",
        "Confirmar quantidade de itens, unidades e descrição dos produtos",
        "Checar CFOP, ICMS e impostos conforme produto e UF",
        "Validar condição de pagamento negociada",
        "Se tudo OK: mudar status para 'Aguardando descarga'",
        "Se houver divergência: registrar anotação detalhada e aguardar correção do Compras"
      ],
      extra: {
        titulo: "Como registrar anotação",
        texto: "A anotação de divergência deve conter: tipo do problema, campo, valor recebido vs. esperado, e se o veículo pode aguardar ou deve ser devolvido."
      },
      alertaTitulo: "Se o status não for atualizado:",
      alerta: "Se o Faturamento não atualizar o status após a conferência, o Compras não recebe o sinal para agir e o veículo fica parado sem nenhuma fila de prioridade. Nenhuma descarga é iniciada."
    },

    {
      numero: 3,
      titulo: "Priorização de descarga",
      setor: "Compras",
      cor: "#EF9F27",
      de: "Aguardando descarga",
      para: "Prioridade definida",
      acoes: [
        "Cada comprador visualiza sua fila de veículos por linha (RED / BLUE / Laranja / Verde / Preto)",
        "Definir ordem de prioridade (escala 0 a 50) no dia anterior ou por agenda proativa",
        "Critérios: ruptura de estoque, perecibilidade, capacidade de doca, SLA com fornecedor",
        "Registrar a prioridade no sistema para cada veículo da sua linha",
        "Em caso de divergência aberta: corrigir com o fornecedor e registrar retorno na anotação"
      ],
      linhas: [
        { nome: "RED", desc: "Bovino", cor: "#E24B4A" },
        { nome: "BLUE", desc: "Aves", cor: "#378ADD" },
        { nome: "Laranja", desc: "Suínos e Laticínios", cor: "#EF9F27" },
        { nome: "Verde", desc: "Seca", cor: "#639922" },
        { nome: "Preto", desc: "Importação", cor: "#444441" }
      ],
      alertaTitulo: "Se a priorização não for realizada:",
      alerta: "Se o Compras não registrar a prioridade, o Recebimento opera por ordem de chegada dentro de cada linha. Sem sinalização até o horário-limite acordado, o Recebimento não espera — mas a responsabilidade pela ordem é do Compras."
    },

    {
      numero: 4,
      titulo: "Em descarga",
      setor: "Recebimento",
      cor: "#7F77DD",
      de: "Prioridade definida",
      para: "Em descarga",
      acoes: [
        "Verificar a fila de prioridades definida pelo Compras",
        "Chamar o veículo conforme a ordem e informar a doca no sistema",
        "Conferir fisicamente os produtos: quantidade, estado, temperatura (para frios)",
        "Registrar avarias ou divergências físicas via anotação no sistema",
        "Informar o Faturamento e o Comercial sobre qualquer avaria relevante",
        "Ao finalizar: mudar status para 'Descarga concluída' no sistema"
      ],
      alertaTitulo: "Se o status não for atualizado:",
      alerta: "Se o Recebimento não mudar o status ao finalizar, o Faturamento não sabe que pode iniciar a análise de pagamento. A descarga fica pendente no sistema e trava a liberação do veículo."
    },

    {
      numero: 5,
      titulo: "Descarga concluída",
      setor: "Sistema (automático)",
      cor: "#888780",
      de: "Em descarga",
      para: "Descarga concluída",
      acoes: [
        "Status atualizado automaticamente após confirmação do Recebimento",
        "Faturamento e Comercial recebem visibilidade do resultado",
        "Anotações de avaria ficam visíveis para análise",
        "Não há ação manual necessária nesta etapa"
      ],
      alertaTitulo: "Se o status não for atualizado:",
      alerta: "Esta etapa é automática — mas depende do passo anterior. Se o Recebimento não confirmar no sistema, este status nunca é ativado e a cadeia para aqui."
    },

    {
      numero: 6,
      titulo: "Liberação faturamento",
      setor: "Faturamento",
      cor: "#378ADD",
      de: "Descarga concluída",
      para: "Liberação faturamento",
      acoes: [
        "Analisar documentos fiscais finais pós-descarga",
        "Verificar anotações de avaria registradas pelo Recebimento",
        "Aprovar ou negociar desconto/crédito em caso de avaria",
        "Autorizar o pagamento da descarga (frete, diária, etc.)",
        "Mudar status para 'Liberação faturamento' no sistema após aprovação"
      ],
      alertaTitulo: "Se o status não for atualizado:",
      alerta: "Sem a liberação do Faturamento, a Portaria não recebe sinal para abrir o acesso de saída. O motorista fica retido no pátio sem previsão — gerando custo de diária e conflito com a transportadora."
    },

    {
      numero: 7,
      titulo: "Liberação portaria",
      setor: "Portaria",
      cor: "#D85A30",
      de: "Liberação faturamento",
      para: "Liberação portaria",
      acoes: [
        "Confirmar no sistema que o Faturamento liberou o veículo",
        "Verificar documentos de saída (NF de remessa, lacres, etc.)",
        "Conferir placa e dados do motorista",
        "Registrar a saída do veículo no sistema",
        "Mudar status para 'Liberação portaria'"
      ],
      alertaTitulo: "Se o status não for atualizado:",
      alerta: "Se a Portaria não registrar a liberação, o ciclo do veículo não encerra no sistema. Isso afeta os KPIs de tempo de pátio e pode acumular registros em aberto que confundem a fila."
    },

    {
      numero: 8,
      titulo: "Veículo liberado",
      setor: "Portaria",
      cor: "#639922",
      de: "Liberação portaria",
      para: "Veículo liberado",
      acoes: [
        "Confirmar saída física do veículo do pátio",
        "Registrar status final 'Veículo liberado' no sistema",
        "Ciclo encerrado — dados disponíveis para KPIs e auditoria",
        "Tempo total de pátio registrado automaticamente"
      ],
      alertaTitulo: "Se o status não for atualizado:",
      alerta: "Encerramento obrigatório. Sem este registro, o pátio apresenta veículos fantasma na fila e os relatórios de desempenho ficam incorretos."
    }
  ];

  const accordion = document.getElementById("accordion");

  etapas.forEach((etapa) => {

    const card = document.createElement("div");
    card.className = "card";
    card.style.borderLeftColor = etapa.cor;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-left">

          <div class="step-number" style="background:${etapa.cor}">
            ${etapa.numero}
          </div>

          <div class="title-group">
            <h2>${etapa.titulo}</h2>
            <span class="badge" style="background:${etapa.cor}">
              ${etapa.setor}
            </span>
          </div>

        </div>

        <div class="chevron"></div>
      </div>

      <div class="card-content">
        <div class="content-inner">

          <div class="status-flow">
            <div class="status-pill">
              <strong>De:</strong> ${etapa.de}
            </div>

            <div class="status-pill">
              <strong>Para:</strong> ${etapa.para}
            </div>
          </div>

          <div class="checklist">
            ${etapa.acoes.map(acao => `
              <div class="check-item">
                <div class="check-icon">✔</div>
                <div>${acao}</div>
              </div>
            `).join("")}
          </div>

          ${etapa.extra ? `
            <div class="note-box">
              <h4>${etapa.extra.titulo}</h4>
              <p>${etapa.extra.texto}</p>
            </div>
          ` : ""}

          ${etapa.linhas ? `
            <div class="line-grid">
              ${etapa.linhas.map(linha => `
                <div class="line-card" style="background:${linha.cor}">
                  <div>${linha.nome}</div>
                  <div style="font-size:14px; opacity:0.9;">
                    ${linha.desc}
                  </div>
                </div>
              `).join("")}
            </div>
          ` : ""}

          <div class="alert-box">
            <div class="alert-title">
              ${etapa.alertaTitulo}
            </div>

            <div class="alert-text">
              ${etapa.alerta}
            </div>
          </div>

        </div>
      </div>
    `;

    accordion.appendChild(card);
  });

  document.querySelectorAll(".card").forEach((card) => {

    const header = card.querySelector(".card-header");
    const content = card.querySelector(".card-content");

    header.addEventListener("click", () => {

      const active = card.classList.contains("active");

      document.querySelectorAll(".card").forEach((c) => {
        c.classList.remove("active");
        c.querySelector(".card-content").style.maxHeight = null;
      });

      if (!active) {
        card.classList.add("active");
        content.style.maxHeight = content.scrollHeight + "px";
      }
    });
  });
</script>

</body>
</html>
