<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guia de Gestão de Pátio - Segalas Alimentos</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f5f7fa;
      color:#1f2937;
      padding:40px 20px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .header{
      margin-bottom:32px;
    }

    .header-top{
      display:flex;
      align-items:center;
      gap:28px;
    }

    .logo{
      width:180px;
      height:auto;
      object-fit:contain;
      display:block;
    }

    .header h1{
      font-size:48px;
      font-weight:800;
      margin-bottom:12px;
      color:#0f172a;
    }

    .header p{
      color:#4b5563;
      font-size:20px;
      line-height:1.5;
      max-width:900px;
    }

    .accordion{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .card{
      background:white;
      border-radius:20px;
      overflow:hidden;
      border-left:8px solid;
      box-shadow:0 6px 18px rgba(0,0,0,0.06);
      transition:all .3s ease;
    }

    .card-header{
      cursor:pointer;
      padding:24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }

    .card-left{
      display:flex;
      align-items:center;
      gap:22px;
      flex:1;
    }

    .step-number{
      width:64px;
      height:64px;
      min-width:64px;
      border-radius:18px;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      font-weight:bold;
      box-shadow:inset 0 -6px 12px rgba(0,0,0,0.15);
    }

    .title-group{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .title-group h2{
      font-size:24px;
      font-weight:700;
      color:#0f172a;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 16px;
      border-radius:999px;
      font-size:15px;
      font-weight:bold;
      color:white;
      box-shadow:inset 0 -4px 10px rgba(0,0,0,0.12);
    }

    .chevron{
      width:18px;
      height:18px;
      border-right:3px solid #374151;
      border-bottom:3px solid #374151;
      transform:rotate(45deg);
      transition:transform .3s ease;
      margin-right:10px;
    }

    .card.active .chevron{
      transform:rotate(-135deg);
      margin-top:8px;
    }

    .card-content{
      max-height:0;
      overflow:hidden;
      transition:max-height .4s ease;
      background:#fff;
    }

    .content-inner{
      padding:0 28px 30px 28px;
    }

    .status-flow{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:28px;
    }

    .status-pill{
      padding:14px 18px;
      border-radius:14px;
      font-size:14px;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .status-from{
      background:#fee2e2;
      color:#991b1b;
      border:2px solid #fca5a5;
    }

    .status-to{
      background:#dcfce7;
      color:#166534;
      border:2px solid #86efac;
    }

    .status-arrow{
      font-size:24px;
      font-weight:bold;
      color:#2563eb;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .checklist{
      display:flex;
      flex-direction:column;
      gap:16px;
      margin-bottom:28px;
    }

    .check-item{
      display:flex;
      align-items:flex-start;
      gap:14px;
      line-height:1.6;
      font-size:15px;
    }

    .check-icon{
      color:#16a34a;
      font-weight:bold;
      font-size:18px;
      margin-top:2px;
    }

    .note-box{
      background:#fff7ed;
      border:2px solid #fb923c;
      border-radius:16px;
      padding:22px;
      margin-bottom:28px;
    }

    .note-box h4{
      margin-bottom:12px;
      font-size:18px;
      color:#9a3412;
      font-weight:800;
    }

    .note-box p{
      line-height:1.7;
      color:#7c2d12;
      font-size:15px;
      font-weight:600;
    }

    .line-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-bottom:28px;
    }

    .line-card{
      color:white;
      padding:20px;
      border-radius:16px;
      font-weight:bold;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:95px;
      box-shadow:inset 0 -8px 12px rgba(0,0,0,0.12);
    }

    .line-title{
      font-size:18px;
    }

    .line-desc{
      font-size:14px;
      opacity:.95;
      font-weight:500;
    }

    .alert-box{
      background:#fff1f1;
      border:2px solid #ef4444;
      border-radius:18px;
      padding:22px;
    }

    .alert-title{
      color:#b91c1c;
      font-size:17px;
      font-weight:800;
      margin-bottom:12px;
    }

    .alert-text{
      color:#7f1d1d;
      line-height:1.7;
      font-size:15px;
    }

    @media (max-width:768px){

      body{
        padding:24px 14px;
      }

      .header-top{
        flex-direction:column;
        align-items:flex-start;
      }

      .logo{
        width:130px;
      }

      .header h1{
        font-size:32px;
      }

      .header p{
        font-size:16px;
      }

      .card-header{
        align-items:flex-start;
      }

      .title-group h2{
        font-size:20px;
      }

      .step-number{
        width:56px;
        height:56px;
        min-width:56px;
        font-size:28px;
      }

      .status-flow{
        flex-direction:column;
        align-items:flex-start;
      }

      .status-arrow{
        transform:rotate(90deg);
      }

    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">

    <div class="header-top">

      <img 
        src="https://raw.githubusercontent.com/segprocess/gestaopatio/main/logo.png"
        alt="Logo Segalas"
        class="logo"
      >

      <div>

        <h1>Guia de gestão de pátio - Segalas Alimentos</h1>

        <p>
          Clique em cada etapa para visualizar responsabilidades, ações obrigatórias e impactos operacionais do fluxo.
        </p>

      </div>

    </div>

  </div>

  <div class="accordion" id="accordion"></div>

</div>

<script>

const etapas = [

{
  numero:1,
  titulo:"Veículo no pátio (check-in)",
  setor:"Portaria",
  cor:"#639922",
  de:"Check-in",
  para:"Veículo no pátio",
  acoes:[
    "Receber motorista na portaria",
    "Registrar veículo e NF-e no sistema",
    "Validar placa, motorista e fornecedor",
    "Realizar bipagem da nota fiscal",
    "Atualizar status para 'Veículo no pátio'"
  ],
  alertaTitulo:"Se o check-in não for realizado:",
  alerta:"Sem o check-in registrado, o Faturamento não consegue iniciar a conferência fiscal e o veículo fica invisível operacionalmente."
},

{
  numero:2,
  titulo:"Fiscal liberado",
  setor:"Faturamento",
  cor:"#378ADD",
  de:"Veículo no pátio",
  para:"Fiscal liberado",
  acoes:[
    "Conferir CNPJ do fornecedor",
    "Validar Ordem de Compra x Nota Fiscal",
    "Conferir CFOP, impostos e tributação",
    "Validar quantidades e descrição dos produtos",
    "Confirmar condição comercial negociada",
    "Registrar divergências fiscais quando existirem no workflow",
    "Alterar status para 'Fiscal liberado'"
  ],
  extra:{
    titulo:"Conferência fiscal",
    texto:"Esta etapa garante que toda validação tributária, documental e comercial esteja aprovada antes da priorização comercial."
  },
  alertaTitulo:"Se o status não for atualizado:",
  alerta:"Sem a liberação fiscal, o veículo não segue para fila operacional e permanece parado no pátio."
},

{
  numero:3,
  titulo:"Priorização de descarga",
  setor:"Compras",
  cor:"#EF9F27",
  de:"Fiscal liberado",
  para:"Prioridade definida",
  acoes:[
    "Visualizar fila operacional por linha",
    "Definir ordem de prioridade",
    "Considerar ruptura, SLA, perecibilidade e docas",
    "Registrar prioridade operacional no sistema"
  ],
  linhas:[
    { nome:"RED", desc:"Bovino", cor:"#E24B4A" },
    { nome:"BLUE", desc:"Aves", cor:"#378ADD" },
    { nome:"Laranja", desc:"Suínos e Laticínios", cor:"#EF9F27" },
    { nome:"Verde", desc:"Seca", cor:"#639922" },
    { nome:"Preto", desc:"Importação", cor:"#444441" }
  ],
  alertaTitulo:"Se a priorização não for realizada:",
  alerta:"Sem prioridade definida, o Recebimento opera apenas por ordem de chegada, podendo gerar ruptura, atrasos operacionais e ocupação incorreta de docas."
},

{
  numero:4,
  titulo:"Aguardando descarga",
  setor:"Faturamento",
  cor:"#378ADD",
  de:"Prioridade definida",
  para:"Aguardando descarga",
  acoes:[
    "Veículo apto operacionalmente para descarga",
    "Veículo já priorizado operacionalmente",
    "Aguardando disponibilidade de doca",
    "Faturamento deverá lançar o bônus",
    "Faturamento deverá observar corretamente as bandeiras da operação",
    "Controle de tempo de espera operacional iniciado",
    "Veículo aguardando chamada para operação física"
  ],
  extra:{
    titulo:"⚠ Regra obrigatória para avanço de status",
    texto:"O veículo SOMENTE poderá entrar no status 'Aguardando descarga' após validação correta das bandeiras e lançamento do bônus pelo Faturamento. Caso não seja realizado, o fluxo operacional ficará bloqueado."
  },
  alertaTitulo:"Se o veículo permanecer aguardando descarga:",
  alerta:"Longos períodos nesta etapa indicam gargalo operacional, indisponibilidade de docas, lentidão operacional ou excesso de veículos simultâneos."
},

{
  numero:5,
  titulo:"Em descarga",
  setor:"Recebimento",
  cor:"#7F77DD",
  de:"Aguardando descarga",
  para:"Em descarga",
  acoes:[
    "Chamar veículo conforme prioridade",
    "Direcionar veículo para doca",
    "Conferir produtos fisicamente",
    "Validar quantidade, qualidade e temperatura",
    "Registrar avarias e divergências",
    "Informar Comercial e Faturamento sobre inconsistências",
    "Finalizar descarga no sistema"
  ],
  alertaTitulo:"Se o status não for atualizado:",
  alerta:"Sem atualização da descarga, o Faturamento não recebe sinalização para continuidade do processo financeiro."
},

{
  numero:6,
  titulo:"Descarga concluída",
  setor:"Recebimento",
  cor:"#7F77DD",
  de:"Em descarga",
  para:"Descarga concluída",
  acoes:[
    "Confirmar encerramento operacional da descarga",
    "Validar apontamentos finais do recebimento",
    "Garantir registro de avarias e divergências",
    "Finalizar conferência física dos produtos",
    "Recebimento deverá alterar o status para 'Liberação faturamento'",
    "Liberar fluxo para atuação do Faturamento"
  ],
  extra:{
    titulo:"⚠ Alteração obrigatória de status",
    texto:"Após finalizar a descarga, o Recebimento é responsável por alterar o status para 'Liberação faturamento'. Sem esta alteração, o Faturamento não conseguirá iniciar a análise final documental e financeira."
  },
  alertaTitulo:"Se o status não for atualizado:",
  alerta:"Sem alteração para 'Liberação faturamento', o veículo permanece bloqueado operacionalmente e o Faturamento não consegue atuar no encerramento do processo."
},

{
  numero:7,
  titulo:"Liberação faturamento",
  setor:"Faturamento",
  cor:"#378ADD",
  de:"Descarga concluída",
  para:"Liberação faturamento",
  acoes:[
    "Analisar documentação final",
    "Validar avarias registradas",
    "Negociar divergências quando necessário",
    "Realizar cobrança da descarga",
    "Liberar veículo para saída"
  ],
  alertaTitulo:"Se o status não for atualizado:",
  alerta:"Sem liberação do Faturamento, a Portaria não recebe autorização para saída do veículo."
},

{
  numero:8,
  titulo:"Liberação portaria",
  setor:"Portaria",
  cor:"#639922",
  de:"Liberação faturamento",
  para:"Liberação portaria",
  acoes:[
    "Validar autorização de saída",
    "Conferir motorista e veículo",
    "Registrar saída no sistema",
    "Finalizar controle operacional"
  ],
  alertaTitulo:"Se o status não for atualizado:",
  alerta:"Sem confirmação da Portaria, o veículo continua aberto no sistema e impacta KPIs operacionais."
},

{
  numero:9,
  titulo:"Veículo liberado",
  setor:"Portaria",
  cor:"#639922",
  de:"Liberação portaria",
  para:"Veículo liberado",
  acoes:[
    "Confirmar saída física",
    "Encerrar ciclo operacional",
    "Disponibilizar dados para auditoria",
    "Finalizar tempo total de permanência"
  ],
  alertaTitulo:"Se o status não for atualizado:",
  alerta:"Sem encerramento final, o sistema mantém veículos fantasmas no pátio e prejudica indicadores logísticos."
}

];

const accordion=document.getElementById("accordion");

etapas.forEach((etapa)=>{

  const card=document.createElement("div");

  card.className="card";
  card.style.borderLeftColor=etapa.cor;

  card.innerHTML=`

    <div class="card-header">

      <div class="card-left">

        <div class="step-number" style="background:${etapa.cor}">
          ${etapa.numero}
        </div>

        <div class="title-group">

          <h2>${etapa.titulo}</h2>

          <span class="badge" style="background:${etapa.cor}">
            ${etapa.setor}
          </span>

        </div>

      </div>

      <div class="chevron"></div>

    </div>

    <div class="card-content">

      <div class="content-inner">

        <div class="status-flow">

          <div class="status-pill status-from">
            <strong>DE:</strong> ${etapa.de}
          </div>

          <div class="status-arrow">
            ➜
          </div>

          <div class="status-pill status-to">
            <strong>PARA:</strong> ${etapa.para}
          </div>

        </div>

        <div class="checklist">

          ${etapa.acoes.map(acao=>`

            <div class="check-item">

              <div class="check-icon">✔</div>

              <div>${acao}</div>

            </div>

          `).join("")}

        </div>

        ${etapa.extra ? `

          <div class="note-box">

            <h4>${etapa.extra.titulo}</h4>

            <p>${etapa.extra.texto}</p>

          </div>

        ` : ""}

        ${etapa.linhas ? `

          <div class="line-grid">

            ${etapa.linhas.map(linha=>`

              <div class="line-card" style="background:${linha.cor}">

                <div class="line-title">
                  ${linha.nome}
                </div>

                <div class="line-desc">
                  ${linha.desc}
                </div>

              </div>

            `).join("")}

          </div>

        ` : ""}

        <div class="alert-box">

          <div class="alert-title">
            ${etapa.alertaTitulo}
          </div>

          <div class="alert-text">
            ${etapa.alerta}
          </div>

        </div>

      </div>

    </div>

  `;

  accordion.appendChild(card);

});

document.querySelectorAll(".card").forEach((card)=>{

  const header=card.querySelector(".card-header");
  const content=card.querySelector(".card-content");

  header.addEventListener("click",()=>{

    const active=card.classList.contains("active");

    document.querySelectorAll(".card").forEach((c)=>{
      c.classList.remove("active");
      c.querySelector(".card-content").style.maxHeight=null;
    });

    if(!active){
      card.classList.add("active");
      content.style.maxHeight=content.scrollHeight + "px";
    }

  });

});

</script>

</body>
</html>
